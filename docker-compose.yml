services:
  expense-tracker:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - expense_db:/app/data
      - expense_uploads:/app/uploads
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/expenses.db
    restart: unless-stopped

volumes:
  expense_db:
  expense_uploads:
