<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    .upload-area {
      border: 2px dashed #dee2e6;
      border-radius: 0.5rem;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
      user-select: none;
    }
    .upload-area:hover,
    .upload-area.dragover {
      border-color: #0d6efd;
      background-color: #f0f5ff;
    }
    #preview-img {
      max-height: 180px;
      object-fit: contain;
      width: 100%;
    }
    .receipt-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
    }
    .table th { white-space: nowrap; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-receipt-cutoff me-2"></i>Expense Tracker
    </span>
  </div>
</nav>

<div class="container pb-5">
  <div class="row g-4">

    <!-- Left column: upload + chart -->
    <div class="col-12 col-lg-4">

      <!-- Upload card -->
      <div class="card shadow-sm">
        <div class="card-header fw-semibold">
          <i class="bi bi-upload me-1"></i> Upload Receipt
        </div>
        <div class="card-body">
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="upload-password" class="form-control" placeholder="Password" />
          </div>

          <div class="upload-area" id="upload-area">
            <i class="bi bi-camera display-4 text-muted"></i>
            <p class="mt-2 mb-0 text-muted small">Drop image here or click to select</p>
            <input type="file" id="file-input" accept="image/*" class="d-none" />
          </div>

          <div id="preview-container" class="mt-3 text-center d-none">
            <img id="preview-img" class="img-thumbnail" alt="Receipt preview" />
          </div>

          <div id="upload-status" class="mt-3 d-none">
            <div class="d-flex align-items-center gap-2 text-primary">
              <div class="spinner-border spinner-border-sm"></div>
              <span>Analyzing receipt with AI…</span>
            </div>
          </div>

          <div id="upload-result" class="mt-3 alert alert-success d-none">
            <i class="bi bi-check-circle me-1"></i>
            <strong>Added!</strong> <span id="result-text"></span>
          </div>

          <div id="upload-error" class="mt-3 alert alert-danger d-none">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <span id="error-text"></span>
          </div>
        </div>
      </div>

      <!-- Stats card -->
      <div class="card shadow-sm mt-4">
        <div class="card-header fw-semibold">
          <i class="bi bi-pie-chart me-1"></i> Spending by Category
        </div>
        <div class="card-body">
          <canvas id="stats-chart"></canvas>
          <div id="stats-list" class="mt-3 small"></div>
        </div>
      </div>

    </div><!-- /left column -->

    <!-- Right column: expenses table -->
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header d-flex flex-wrap gap-2 justify-content-between align-items-center">
          <span class="fw-semibold"><i class="bi bi-list-ul me-1"></i>Expenses</span>
          <div class="d-flex gap-2 align-items-center">
            <select id="category-filter" class="form-select form-select-sm" style="width:auto">
              <option value="">All categories</option>
            </select>
            <span class="badge bg-primary fs-6" id="total-badge">€0.00</span>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Receipt</th>
                  <th>Merchant</th>
                  <th>Date</th>
                  <th>Category</th>
                  <th>Notes</th>
                  <th class="text-end">Amount</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="expenses-body">
                <tr id="empty-row">
                  <td colspan="7" class="text-center text-muted py-5">
                    <i class="bi bi-inbox display-6 d-block mb-2"></i>
                    No expenses yet — upload a receipt to get started!
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div><!-- /right column -->

  </div>
</div>

<!-- Image preview modal -->
<div class="modal fade" id="imageModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center p-2">
        <img id="modal-img" src="" alt="Receipt" class="img-fluid rounded" />
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
